workflows:
  ios-sideload-workflow:
    name: iOS Sideload Workflow
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Turbo Build (Simulator Hack)
        script: |
          set -e
          rm -rf ios build
          
          # 1. Создаем проект
          flutter create --platforms=ios --org com.coolmag .
          
          # 2. Подтягиваем зависимости
          flutter pub get
          
          # 3. Генерируем конфиги iOS (без полной сборки)
          flutter build ios --debug --no-codesign --config-only
          
          # 4. ХАК: Отключаем подпись на уровне проекта Xcode
          find ios -name "project.pbxproj" -exec sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' {} +
          find ios -name "project.pbxproj" -exec sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' {} +
          
          # 5. Устанавливаем поды (теперь они будут настоящими)
          cd ios && pod install && cd ..
          
          # 6. Сборка для симулятора (она никогда не требует подписи!)
          # Sideloadly умеет перепаковывать такие файлы для реального iPhone
          flutter build ios --debug --simulator
          
          # 7. Упаковка
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphonesimulator/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa && zip -r Runner.ipa Payload
    artifacts:
      - build/ios/ipa/Runner.ipa
