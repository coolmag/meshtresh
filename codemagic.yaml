workflows:
  ios-sideload-workflow:
    name: iOS Sideload Workflow
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Clean and Restore iOS project
        script: |
          rm -rf ios
          flutter create --platforms=ios --org com.coolmag .
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Build iOS App (Speed Debug Mode)
        script: |
          # Собираем Debug версию - она в 5 раз быстрее и легче
          flutter build ios --debug --no-codesign
      - name: Create Unsigned IPA
        script: |
          # В Debug моде путь к приложению немного другой
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/debug-iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa && zip -r Runner.ipa Payload
    artifacts:
      - build/ios/ipa/Runner.ipa
