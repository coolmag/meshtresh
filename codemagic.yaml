workflows:
  ios-sideload-workflow:
    name: iOS Sideload Workflow (Final Fix)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Preparation
        script: |
          set -e
          rm -rf ios build
          flutter create --platforms=ios --org com.coolmag .
          flutter pub get
          
          # Настройка минимальной версии iOS для всех подов
          echo "post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end" >> ios/Podfile
          
          cd ios && pod install && cd ..

      - name: Build Unsigned Debug App
        script: |
          # Собираем DEBUG версию для реального устройства (iphoneos) без подписи
          # Это самый стабильный вариант для Sideloadly
          flutter build ios --debug --no-codesign

      - name: Package IPA
        script: |
          set -e
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r Runner.ipa Payload
          echo "IPA Created Successfully"
    artifacts:
      - build/ios/ipa/Runner.ipa
