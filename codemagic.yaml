workflows:
  ios-sideload-workflow:
    name: iOS Sideload Workflow
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Raw Xcode Build (No Sign)
        script: |
          set -e
          rm -rf ios build
          
          # 1. Восстановление проекта
          flutter create --platforms=ios --org com.coolmag .
          flutter pub get
          
          # 2. Генерация конфигов (критично для путей)
          flutter build ios --debug --simulator --no-codesign --config-only
          
          # 3. Настройка Pods
          cd ios && pod install && cd ..
          
          # 4. ПРЯМОЙ ВЫЗОВ XCODE
          # Мы принудительно задаем папки для сборки, чтобы CocoaPods не терял ресурсы
          mkdir -p build/ios/iphonesimulator
          xcodebuild -workspace ios/Runner.xcworkspace \
                     -scheme Runner \
                     -configuration Debug \
                     -sdk iphonesimulator \
                     -arch arm64 \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     SYMROOT=$PWD/build/ios/iphonesimulator \
                     OBJROOT=$PWD/build/ios/iphonesimulator/obj \
                     CONFIGURATION_BUILD_DIR=$PWD/build/ios/iphonesimulator \
                     build
          
          # 5. Упаковка IPA
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphonesimulator/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa && zip -r Runner.ipa Payload
    artifacts:
      - build/ios/ipa/Runner.ipa
