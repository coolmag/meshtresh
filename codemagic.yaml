workflows:
  ios-sideload-workflow:
    name: iOS Sideload Workflow
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Clean and Restore iOS project
        script: |
          rm -rf ios
          flutter create --platforms=ios --org com.coolmag .
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Build iOS App (Force Unsigned)
        script: |
          # Генерируем необходимые файлы Flutter для Xcode
          flutter build ios --release --no-codesign || true
          
          # Собираем проект напрямую через xcodebuild без подписи
          xcodebuild -workspace ios/Runner.xcworkspace \
                     -scheme Runner \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     build
      - name: Create Unsigned IPA
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa && zip -r Runner.ipa Payload
    artifacts:
      - build/ios/ipa/Runner.ipa
