workflows:
  ios-sideload-workflow:
    name: iOS Sideload Workflow (Stable Flutter Build)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Clean and Regenerate iOS Project
        script: |
          set -e
          rm -rf ios
          flutter create --platforms=ios --org com.coolmag .
          
          plutil -insert NSBluetoothAlwaysUsageDescription -string "App needs Bluetooth to connect with nearby devices in Mesh network." ios/Runner/Info.plist
          plutil -insert NSBluetoothPeripheralUsageDescription -string "App needs Bluetooth to discover other devices." ios/Runner/Info.plist
          plutil -insert NSLocalNetworkUsageDescription -string "Local network is used for direct message transfer." ios/Runner/Info.plist
          plutil -insert NSLocationWhenInUseUsageDescription -string "Location is required for Nearby Connections." ios/Runner/Info.plist
          plutil -insert NSCameraUsageDescription -string "App needs camera access to send photo messages in Mesh network." ios/Runner/Info.plist
          plutil -insert NSPhotoLibraryUsageDescription -string "App needs photo library access to send images." ios/Runner/Info.plist
          plutil -insert NSBonjourServices -json '["_mp-connection._tcp", "_mp-connection._udp", "_crisis-mesh._tcp", "_crisis-mesh._udp"]' ios/Runner/Info.plist
          plutil -insert UIRequiresPersistentWiFi -bool true ios/Runner/Info.plist
          
          cd ios
          sed -i '' "s/post_install do |installer|/post_install do |installer|\\
            installer.pods_project.targets.each do |target|\\
              target.build_configurations.each do |config|\\
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'\\
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['\$(inherited)', 'PERMISSION_CAMERA=1', 'PERMISSION_PHOTOS=1', 'PERMISSION_LOCATION=1', 'PERMISSION_BLUETOOTH=1']\\
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'\\
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'\\
                config.build_settings['SWIFT_COMPILATION_MODE'] = 'singlefile'\\
                config.build_settings['SWIFT_OPTIMIZATION_LEVEL'] = '-Onone'\\
              end\\
            end/g" Podfile

      - name: Install Dependencies
        script: |
          set -e
          flutter clean
          flutter pub get
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      - name: Build App (Pure Xcodebuild to bypass Provisioning Profile lock)
        script: |
          cd ios
          # Настраиваем разрешения и Ad-Hoc подпись для Pods (чтобы избежать зависаний компилятора)
          sed -i '' "s/post_install do |installer|/post_install do |installer|\\
            installer.pods_project.targets.each do |target|\\
              target.build_configurations.each do |config|\\
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'\\
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['\$(inherited)', 'PERMISSION_CAMERA=1', 'PERMISSION_PHOTOS=1', 'PERMISSION_LOCATION=1', 'PERMISSION_BLUETOOTH=1']\\
                config.build_settings['CODE_SIGN_IDENTITY'] = '-'\\
              end\\
            end/g" Podfile
          
          # Отключаем Development Team прямо в проекте Runner
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
          
          cd ..
          
          # Генерируем конфигурацию Flutter (только конфигурация, без сборки, чтобы Flutter не блокировал нас)
          flutter build ios --config-only --release
          
          # Собираем приложение чистым xcodebuild. Он позволяет игнорировать отсутствие Development Team
          cd ios
          xcodebuild clean build -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="-" EXPANDED_CODE_SIGN_IDENTITY="-"
          cd ..
          
          echo "Finished Xcodebuild step."

      - name: Package IPA for Sideloadly
        script: |
          set -e
          mkdir -p build/ios/ipa/Payload
          
          # Ищем Runner.app в папке DerivedData (по умолчанию для чистого xcodebuild) или build/
          echo "Searching for Runner.app..."
          APP_DIR=$(find . -name "Runner.app" -type d | grep -v "Intermediate" | head -n 1)
          
          if [ -z "$APP_DIR" ]; then
             echo "Error: Runner.app not found."
             exit 1
          fi
          
          # Проверка размера (чтобы не упаковать "пустышку")
          APP_SIZE=$(du -sk "$APP_DIR" | cut -f1)
          echo "Found app at: $APP_DIR (Size: $APP_SIZE KB)"
          
          if [ "$APP_SIZE" -lt 5000 ]; then
             echo "Error: Runner.app is too small ($APP_SIZE KB). Build failed to produce a valid app."
             exit 1
          fi
          
          cp -r "$APP_DIR" build/ios/ipa/Payload/
          
          cd build/ios/ipa
          zip -r Runner.ipa Payload
          echo "IPA Created Successfully"
    artifacts:
      - build/ios/ipa/Runner.ipa

  android-workflow:
    name: Android APK Build
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Install Dependencies
        script: |
          flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
