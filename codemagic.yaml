workflows:
  ios-sideload-workflow:
    name: iOS Sideload Workflow (100% Working)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Install Dependencies
        script: |
          set -e
          # Чистим только билд-кеш, НЕ удаляем папку ios!
          flutter clean
          flutter pub get
          
          # Устанавливаем поды
          cd ios
          pod install
          cd ..

      - name: Build Unsigned Release App
        script: |
          # Собираем RELEASE (решает проблему белого экрана JIT)
          # Используем родной Info.plist из репозитория со всеми разрешениями
          flutter build ios --release --no-codesign

      - name: Package IPA for Sideloadly
        script: |
          set -e
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r Runner.ipa Payload
          echo "IPA Created Successfully"
    artifacts:
      - build/ios/ipa/Runner.ipa
